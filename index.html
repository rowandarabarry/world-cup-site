<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rowan's World Cup Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=45" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner wrap">
      <a class="brand" href="./">
        <span class="brand-icon">⚽</span>
        <span class="brand-text">ROWAN'S <em>WORLD CUP ZONE</em></span>
      </a>
      <nav class="tabs" aria-label="Primary navigation">
        <a class="tab" href="./" data-page="home">Home</a>

        <div class="tab-dropdown">
          <button class="tab tab-drop-btn" data-group="tournament">Tournament ▾</button>
          <div class="tab-dropdown-menu">
            <a class="tab-dropdown-item" href="./?fixtures=1" data-page="fixtures">Fixtures</a>
            <a class="tab-dropdown-item" href="./?results=1"  data-page="results">Results</a>
            <a class="tab-dropdown-item" href="./?groups=1"   data-page="groups">Groups</a>
            <a class="tab-dropdown-item" href="./?teams=1"    data-page="teams">Teams</a>
            <a class="tab-dropdown-item" href="./?wallchart=1" data-page="wallchart">Wall Chart</a>
          </div>
        </div>

        <div class="tab-dropdown">
          <button class="tab tab-drop-btn" data-group="zone">Rowan's Zone ▾</button>
          <div class="tab-dropdown-menu">
            <a class="tab-dropdown-item" href="./?review=1"   data-page="review">Tournament Review</a>
            <a class="tab-dropdown-item" href="./?blog=1"     data-page="blog">Rowan's Blog</a>
          </div>
        </div>

        <div class="tab-dropdown">
          <button class="tab tab-drop-btn" data-group="competition">Competition ▾</button>
          <div class="tab-dropdown-menu">
            <a class="tab-dropdown-item" href="./?predict=1"     data-page="predict">Enter Picks</a>
            <a class="tab-dropdown-item" href="./?leaderboard=1" data-page="leaderboard">Leaderboard</a>
          </div>
        </div>
      </nav>
      <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main id="app">
    <noscript>Please enable JavaScript to view this site.</noscript>
  </main>

  <footer>
    <div class="wrap footer-inner">
      <span class="footer-brand">⚽ Rowan's World Cup Zone</span>
      <div class="footer-views">
        <span class="views-label">Site Views</span>
        <span class="views-count" id="site-views">—</span>
      </div>
      <small>Made with ❤️ by our family · © <span id="year"></span></small>
    </div>
  </footer>

  <!-- GoatCounter analytics -->
  <script data-goatcounter="https://deccy7.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

  <script>
    /* Fetch total site views using GoatCounter visitor counter */
    async function loadViews() {
      try {
        const res = await fetch('https://deccy7.goatcounter.com/counter/%2F.json');
        if (!res.ok) return;
        const data = await res.json();
        if (data && data.count !== undefined) {
          document.getElementById('site-views').textContent = Number(data.count).toLocaleString();
        }
      } catch(e) { /* silently fail */ }
    }
    loadViews();
  </script>

  <script src="maps.js?v=1"></script>
  <script src="app.js?v=45"></script>
</body>
</html>
