  <!-- GoatCounter analytics -->
  <script data-goatcounter="https://deccy7.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

  <script>
    /* Fetch total site views using GoatCounter visitor counter */
    async function loadViews() {
      try {
        /* GoatCounter visitor counter — requires "Allow adding visitor counts"
           to be enabled in GoatCounter Settings and site added to allowlist */
        const res = await fetch('https://deccy7.goatcounter.com/counter/%2F.json');
        if (!res.ok) return;
        const text = await res.text();
        const data = JSON.parse(text);
        if (data && data.count !== undefined) {
          const count = parseInt(String(data.count).replace(/\s/g, ''), 10);
          if (!isNaN(count)) document.getElementById('site-views').textContent = count.toLocaleString();
        }
      } catch(e) { /* silently fail until allowlist is set */ }
    }
    loadViews();
  </script>
